<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
  }
  canvas#graph {
    display: block;
    width: 100%;
    height: 100%;
    cursor: grab;
  }
  canvas#graph.dragging { cursor: grabbing; }
</style>
</head>
<body>
<canvas id="graph"></canvas>
<script src="d3.v7.min.js"></script>
<script src="graph.js"></script>
</body>
</html>
